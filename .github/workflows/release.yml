name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binary:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: node20-macos-arm64
            asset: invoice-macos-arm64
          - os: ubuntu-latest
            target: node20-linux-x64
            asset: invoice-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx pkg package.json --targets ${{ matrix.target }} --output dist/invoice --fallback-to-source

      - name: Package binary
        run: |
          mkdir -p release
          tar -czf release/${{ matrix.asset }}.tar.gz -C dist invoice
          shasum -a 256 release/${{ matrix.asset }}.tar.gz > release/${{ matrix.asset }}.tar.gz.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            release/${{ matrix.asset }}.tar.gz
            release/${{ matrix.asset }}.tar.gz.sha256
